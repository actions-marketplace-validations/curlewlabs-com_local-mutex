name: 'Local Mutex'
description: >-
  Serialize shared resources across self-hosted runners on the same machine. Kernel-level lockf/flock.
author: 'curlewlabs-com'
branding:
  icon: 'lock'
  color: 'blue'

inputs:
  name:
    description: >-
      Lock identifier. Used to form the lock file basename under /tmp
      (as 'local-mutex-<sanitized-name>.lock'). Pick a name that describes
      the resource being protected (e.g. 'tool-update', 'dep-cache-rebuild',
      'db-migrate'). Names with characters outside [a-zA-Z0-9._-] are
      sanitized to underscores. Sanitization is lossy: names that differ
      only in non-allowed characters will map to the same lock. Names
      longer than 200 characters are truncated. Empty or whitespace-only
      values are rejected. Names that share the first 200 characters
      after sanitization will collide and share the same lock.
    required: true
  run:
    description: >-
      Shell command to execute while holding the lock. Runs under /bin/sh.
      Multi-line scripts are supported. Use `set -e` if you want abort-on-
      first-failure semantics — the wrapper does not impose them. Empty or
      whitespace-only values are rejected.
    required: true
  lock-dir:
    description: >-
      Absolute path to the directory where the lock file is created.
      Defaults to /tmp. Override this only when /tmp is not shared
      across the runners on the same machine — for example, on
      containerized self-hosted runners where /tmp is container-local.
      The directory must exist and be writable by the runner user. The
      lock file name inside this directory is always
      'local-mutex-<sanitized-name>.lock' so callers setting the same
      name from two runners continue to serialize as long as they share
      lock-dir.
    required: false
    default: ''

outputs:
  output-file:
    description: >-
      Path to a file containing all GITHUB_OUTPUT writes made by the inner
      command. Callers that need to propagate outputs across the composite
      action boundary can cat this file into their own GITHUB_OUTPUT in a
      subsequent step. See README.md for the pattern.
    value: ${{ steps.run.outputs.output-file }}

runs:
  using: 'composite'
  steps:
    - name: Run under local mutex
      id: run
      shell: sh
      env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_RUN: ${{ inputs.run }}
        INPUT_LOCK_DIR: ${{ inputs.lock-dir }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Redirect the inner command's GITHUB_OUTPUT writes to a
        # separate file so they can be propagated by the caller.
        inner_output="${RUNNER_TEMP:-/tmp}/local-mutex-output-$$"
        : > "$inner_output"
        outer_output="$GITHUB_OUTPUT"
        GITHUB_OUTPUT="$inner_output"
        export GITHUB_OUTPUT

        # Always pass lock-dir as the 3rd positional arg. The script
        # treats empty string the same as "unset" — both fall back to
        # the /tmp default — so this single shape works for callers who
        # set lock-dir and callers who don't.
        rc=0
        sh "$ACTION_PATH/lib/local-mutex.sh" "$INPUT_NAME" "$INPUT_RUN" "$INPUT_LOCK_DIR" || rc=$?

        # Restore GITHUB_OUTPUT and copy inner writes to both the
        # step's own outputs (for internal use) and the original
        # output stream.
        GITHUB_OUTPUT="$outer_output"
        export GITHUB_OUTPUT
        cat "$inner_output" >> "$GITHUB_OUTPUT"
        printf 'output-file=%s\n' "$inner_output" >> "$GITHUB_OUTPUT"

        exit "$rc"
