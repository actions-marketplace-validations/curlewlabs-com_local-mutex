name: 'Local Mutex'
description: >-
  Wrap a command in a local-filesystem mutex (lockf or flock) to serialize.
author: 'curlewlabs-com'
branding:
  icon: 'lock'
  color: 'blue'

inputs:
  name:
    description: >-
      Lock identifier. Used to form the lock file basename under /tmp
      (as 'local-mutex-<sanitized-name>.lock'). Pick a name that describes
      the resource being protected (e.g. 'tool-update', 'dep-cache-rebuild',
      'db-migrate'). Names with characters outside [a-zA-Z0-9._-] are
      sanitized to underscores. Sanitization is lossy: names that differ
      only in non-allowed characters will map to the same lock. Names
      longer than 200 characters are truncated. Empty or whitespace-only
      values are rejected. Names that share the first 200 characters
      after sanitization will collide and share the same lock.
    required: true
  run:
    description: >-
      Shell command to execute while holding the lock. Runs under /bin/sh.
      Multi-line scripts are supported. Use `set -e` if you want abort-on-
      first-failure semantics — the wrapper does not impose them. Empty or
      whitespace-only values are rejected.
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run under local mutex
      shell: sh
      env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_RUN: ${{ inputs.run }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        sh "$ACTION_PATH/lib/local-mutex.sh" "$INPUT_NAME" "$INPUT_RUN"
