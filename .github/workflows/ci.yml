name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Shellcheck
        run: shellcheck lib/local-mutex.sh

  # actionlint covers two gaps shellcheck alone misses:
  # 1. action.yml is YAML (shellcheck only reads shell)
  # 2. Inline `run:` blocks in this very workflow contain hundreds of lines
  #    of shell that need the same scrutiny as lib/local-mutex.sh.
  # actionlint understands GitHub Actions syntax AND wraps shellcheck on
  # every inline run block, so adding it here applies the AGENTS.md
  # "all scripts must pass shellcheck" rule to the workflow itself.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run actionlint
        # Pin the installer script to a specific actionlint release commit
        # rather than tracking `main`. The commit hash corresponds to
        # rhysd/actionlint tag v1.7.12, and the installer script downloads
        # the matching versioned binary. Hard-pin per the repo's dependency
        # policy: floating refs silently follow whatever HEAD happens to be.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

  # Matrix on both OSes because the script branches on which lock binary is
  # available. Linux GitHub-hosted runners have flock; macOS GitHub-hosted
  # runners have lockf. Both must pass identical behavior tests.
  integration-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Custom job-level env var used by the "job-level env propagates" test
    # below. Defining it here (rather than on a single step) is the whole
    # point of the test — it proves values set at job scope reach the
    # wrapped command.
    env:
      CUSTOM_TEST_VAR: expected-value
    steps:
      - uses: actions/checkout@v6.0.2

      # Pre-compute SHA-256 lockfile basenames for every fixed test name
      # used below. Each subsequent step references $H_<UPPER_NAME> when
      # constructing lockfile paths, which keeps the individual tests
      # focused on behavior instead of repeating the `printf | shasum |
      # cut` boilerplate 20+ times. Names with dynamic content (the
      # very-long-name test, the invalid-UTF-8-byte test, the
      # long-prefix collision test) compute their hash inline because
      # their input doesn't fit cleanly as a static env var value.
      - name: Compute lockfile hashes for fixed test names
        run: |
          h() {
            if command -v sha256sum >/dev/null 2>&1; then
              printf '%s' "$1" | sha256sum | cut -d' ' -f1
            else
              printf '%s' "$1" | shasum -a 256 | cut -d' ' -f1
            fi
          }
          {
            printf 'H_T_STDIO=%s\n'          "$(h t-stdio)"
            printf 'H_CONC_2=%s\n'           "$(h conc-2)"
            printf 'H_STRESS_20=%s\n'        "$(h stress-20)"
            printf 'H_NAME_A=%s\n'           "$(h name-a)"
            printf 'H_NAME_B=%s\n'           "$(h name-b)"
            printf 'H_KILL_TEST=%s\n'        "$(h kill-test)"
            printf 'H_TERM_TEST=%s\n'        "$(h term-test)"
            printf 'H_SEQ_TEST=%s\n'         "$(h seq-test)"
            printf 'H_SPECIAL=%s\n'          "$(h 'foo/bar:baz@v1')"
            printf 'H_TRAVERSAL=%s\n'        "$(h '../../etc/passwd')"
            printf 'H_DOT=%s\n'              "$(h '.')"
            printf 'H_T_DIAG=%s\n'           "$(h t-diag)"
            printf 'H_T_DIAG_FAIL=%s\n'      "$(h t-diag-fail)"
            printf 'H_T_DIAG_TRAP=%s\n'      "$(h t-diag-trap)"
            printf 'H_T_CUSTOM_DIR=%s\n'     "$(h t-custom-dir)"
            printf 'H_T_EMPTY_LD=%s\n'       "$(h t-empty-ld)"
            printf 'H_T_ACTION_LOCKDIR=%s\n' "$(h t-action-lockdir)"
          } >> "$GITHUB_ENV"

      # ─── Sanity ──────────────────────────────────────────────────────────

      - name: Single invocation succeeds
        uses: ./
        with:
          name: t-single
          run: echo "single invocation works"

      - name: Failed command propagates exit code
        id: failed-cmd
        continue-on-error: true
        uses: ./
        with:
          name: t-fail
          run: exit 42

      - name: Failed command fails the step
        run: |
          [ "${{ steps.failed-cmd.outcome }}" = "failure" ] \
            || (echo "Expected failure outcome, got: ${{ steps.failed-cmd.outcome }}" && exit 1)
          echo "Failed command fails the step: OK"

      - name: Multi-line run with set -e aborts on first failure
        id: multiline-set-e
        continue-on-error: true
        uses: ./
        with:
          name: t-set-e
          run: |
            set -e
            echo "first" > /tmp/multiline-marker
            false
            echo "second" >> /tmp/multiline-marker

      - name: Verify second line did not run
        run: |
          [ "${{ steps.multiline-set-e.outcome }}" = "failure" ] \
            || (echo "Expected failure on set -e abort" && exit 1)
          content=$(cat /tmp/multiline-marker)
          [ "$content" = "first" ] \
            || (echo "Expected only 'first' in marker (set -e abort), got: $content" && exit 1)
          rm -f /tmp/multiline-marker
          echo "set -e abort: OK"

      # Guards the action.yml promise that the wrapper does not impose
      # `set -e`. A regression that added `-e` inside `sh -c` (or equivalent)
      # would silently abort wrapped scripts on the first failed command,
      # which is a behavior change callers would not expect. The test runs
      # `false` followed by a marker write and asserts both the step
      # succeeds AND the marker exists — proving the default shell kept
      # running past the failing command.
      - name: Wrapper does not impose set -e by default
        uses: ./
        with:
          name: t-no-set-e
          run: |
            rm -f /tmp/no-set-e-marker
            false
            echo ok > /tmp/no-set-e-marker

      - name: Verify default-no-set-e marker exists
        run: |
          test -f /tmp/no-set-e-marker \
            || (echo "Expected marker file — wrapper must not impose set -e" && exit 1)
          content=$(cat /tmp/no-set-e-marker)
          [ "$content" = "ok" ] \
            || (echo "Expected marker content 'ok', got: $content" && exit 1)
          rm -f /tmp/no-set-e-marker
          echo "Default no-set-e behavior: OK"

      - name: stdout and stderr from wrapped command are separated
        run: |
          rm -f /tmp/stdout-capture /tmp/stderr-capture \
                "/tmp/local-mutex-${H_T_STDIO}.lock"

          # Invoke the script directly (rather than via `uses: ./`) so we
          # can redirect stdout and stderr to separate files and verify
          # each stream ends up where it should. The action itself just
          # runs the same script via `sh "$ACTION_PATH/lib/local-mutex.sh"`,
          # so this exercises the same code path while giving the test
          # access to the streams. Using an absolute path via
          # $GITHUB_WORKSPACE keeps the invocation robust if a future step
          # changes the working directory.
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-stdio \
            'echo "STDOUT_MARKER_12345"; echo "STDERR_MARKER_67890" >&2' \
            > /tmp/stdout-capture 2> /tmp/stderr-capture

          grep -q 'STDOUT_MARKER_12345' /tmp/stdout-capture \
            || (echo "stdout marker not on stdout" \
                && echo "--- stdout ---" && cat /tmp/stdout-capture \
                && echo "--- stderr ---" && cat /tmp/stderr-capture \
                && exit 1)
          grep -q 'STDERR_MARKER_67890' /tmp/stderr-capture \
            || (echo "stderr marker not on stderr" \
                && echo "--- stdout ---" && cat /tmp/stdout-capture \
                && echo "--- stderr ---" && cat /tmp/stderr-capture \
                && exit 1)

          # Negative assertions: the streams must not be crossed.
          ! grep -q 'STDERR_MARKER_67890' /tmp/stdout-capture \
            || (echo "stderr marker leaked onto stdout" && exit 1)
          ! grep -q 'STDOUT_MARKER_12345' /tmp/stderr-capture \
            || (echo "stdout marker leaked onto stderr" && exit 1)

          rm -f /tmp/stdout-capture /tmp/stderr-capture \
                "/tmp/local-mutex-${H_T_STDIO}.lock"
          echo "stdout/stderr separation: OK"

      # ─── Concurrency: the central feature ────────────────────────────────

      - name: Two concurrent same-name acquires serialize
        run: |
          rm -f /tmp/conc-1-start /tmp/conc-1-end \
                /tmp/conc-2-start /tmp/conc-2-end \
                "/tmp/local-mutex-${H_CONC_2}.lock"

          # Background two callers competing for the same lock. Each logs
          # its start and end timestamps and sleeps in between. The
          # invariant under a working lock is that the two [start, end]
          # windows do not overlap: the earlier caller's end-time must be
          # less than or equal to the later caller's start-time (plus a
          # small jitter tolerance). We assert this non-interleave
          # property rather than a specific completion order so the test
          # is insensitive to scheduling jitter under CI load — we don't
          # care WHICH caller goes first, only that they don't overlap.
          #
          # Timestamps come from `python3 -c 'print(time.time_ns())'`
          # because both the ubuntu-latest and macos-latest runners have
          # python3 preinstalled and it gives unambiguous nanosecond
          # integer output on both platforms. Shelling to `date` is
          # portable-enough but the `%N` format specifier is not
          # universally supported across BSD/GNU date versions and we
          # don't want platform-specific branches in a concurrency test.
          ts='python3 -c "import time; print(time.time_ns())"'
          hold_sleep=0.5
          # 100 ms tolerance: process-teardown and re-exec between the
          # two lock holders can plausibly take tens of ms under CI load.
          tolerance=100000000

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh conc-2 \
            "$ts > /tmp/conc-1-start; sleep $hold_sleep; $ts > /tmp/conc-1-end" &
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh conc-2 \
            "$ts > /tmp/conc-2-start; sleep $hold_sleep; $ts > /tmp/conc-2-end" &
          wait

          s1=$(cat /tmp/conc-1-start)
          e1=$(cat /tmp/conc-1-end)
          s2=$(cat /tmp/conc-2-start)
          e2=$(cat /tmp/conc-2-end)

          # Determine which caller ran first and assert the earlier one's
          # end-time is <= the later one's start-time (plus jitter
          # tolerance). Either ordering is acceptable — we are testing
          # mutual exclusion, not fairness.
          if [ "$s1" -le "$s2" ]; then
            earlier_end=$e1
            later_start=$s2
            order="1-then-2"
          else
            earlier_end=$e2
            later_start=$s1
            order="2-then-1"
          fi

          if [ "$earlier_end" -gt "$((later_start + tolerance))" ]; then
            echo "Overlap detected ($order): earlier_end=$earlier_end, later_start=$later_start"
            echo "  s1=$s1 e1=$e1 s2=$s2 e2=$e2"
            exit 1
          fi

          rm -f /tmp/conc-1-start /tmp/conc-1-end \
                /tmp/conc-2-start /tmp/conc-2-end \
                "/tmp/local-mutex-${H_CONC_2}.lock"
          echo "Concurrent same-name serialization: OK (order: $order)"

      - name: Stress — 20 concurrent acquires of the same name
        run: |
          rm -f /tmp/stress-log "/tmp/local-mutex-${H_STRESS_20}.lock"

          # Spawn 20 background acquires in parallel. Each writes start/end
          # markers; sleep is short so the test stays fast but real enough
          # that an interleave would be visible.
          i=1
          while [ $i -le 20 ]; do
            sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh stress-20 "echo \"${i}-s\" >> /tmp/stress-log; sleep 0.05; echo \"${i}-e\" >> /tmp/stress-log" &
            i=$((i + 1))
          done
          wait

          # Each caller wrote exactly one start and one end marker.
          start_count=$(grep -c -- '-s$' /tmp/stress-log)
          end_count=$(grep -c -- '-e$' /tmp/stress-log)
          [ "$start_count" = "20" ] \
            || (echo "Expected 20 start markers, got $start_count" && cat /tmp/stress-log && exit 1)
          [ "$end_count" = "20" ] \
            || (echo "Expected 20 end markers, got $end_count" && cat /tmp/stress-log && exit 1)

          # Critical invariant: every start must be immediately followed by
          # the matching end before any other start appears. Walk the log
          # in pairs and assert each pair has matching IDs and is s/e order.
          line_count=$(wc -l < /tmp/stress-log | tr -d ' ')
          [ "$line_count" = "40" ] \
            || (echo "Expected 40 log lines, got $line_count" && exit 1)

          line=1
          while [ $line -le 40 ]; do
            start_line=$(sed -n "${line}p" /tmp/stress-log)
            end_line=$(sed -n "$((line + 1))p" /tmp/stress-log)
            start_id="${start_line%-s}"
            end_id="${end_line%-e}"
            [ "$start_id" = "$end_id" ] \
              || (echo "Interleave detected at line $line: $start_line / $end_line" && cat /tmp/stress-log && exit 1)
            case "$start_line" in *-s) ;; *) echo "Expected start at line $line, got $start_line" && exit 1 ;; esac
            case "$end_line" in *-e) ;; *) echo "Expected end at line $((line + 1)), got $end_line" && exit 1 ;; esac
            line=$((line + 2))
          done

          rm -f /tmp/stress-log "/tmp/local-mutex-${H_STRESS_20}.lock"
          echo "Stress 20 concurrent: OK"

      - name: Different names don't block each other
        run: |
          rm -f "/tmp/local-mutex-${H_NAME_A}.lock" "/tmp/local-mutex-${H_NAME_B}.lock"

          # If different names share a lock (bug), this takes ~6s. If they
          # don't (correct), it takes ~3s. Use sleep 3 instead of sleep 1 so
          # the parallel-vs-serial gap is wide enough that integer-second
          # `date +%s` rounding can't mask a regression. Bound is `-le 4`
          # (parallel run can be 3 or 4 depending on second-boundary timing,
          # serial run would be 6 or 7 — easily distinguished).
          start=$(date +%s)
          # parallel ≈ 3s, serial ≈ 6s, so an upper bound of 4s catches
          # regressions while tolerating runner jitter.
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh name-a 'sleep 3' &
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh name-b 'sleep 3' &
          wait
          end=$(date +%s)
          elapsed=$((end - start))

          [ "$elapsed" -le 4 ] \
            || (echo "Expected ~3s parallel, got ${elapsed}s — likely blocking on shared lock" && exit 1)

          rm -f "/tmp/local-mutex-${H_NAME_A}.lock" "/tmp/local-mutex-${H_NAME_B}.lock"
          echo "Different names parallel: OK (${elapsed}s)"

      - name: Auto-release on SIGKILL
        run: |
          rm -f "/tmp/local-mutex-${H_KILL_TEST}.lock"

          # Background a holder that sleeps for a long time
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh kill-test 'sleep 60' &
          holder_pid=$!

          # Wait for the holder to actually acquire the lock before killing.
          # Without this sleep, kill -9 might race the lock acquisition and
          # we'd be testing "kill before acquire" instead of "kill while
          # holding," which doesn't exercise the kernel cleanup path.
          sleep 0.5

          # SIGKILL the holder. The kernel should release the lock as part
          # of process teardown — flock releases on FD close, lockf on
          # process exit. Either way, no waiting required.
          kill -9 "$holder_pid" 2>/dev/null
          wait 2>/dev/null

          # New acquire should succeed immediately. Time it to make sure
          # we're not silently blocking.
          start=$(date +%s)
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh kill-test 'echo "acquired after kill"'
          end=$(date +%s)
          elapsed=$((end - start))

          [ "$elapsed" -le 1 ] \
            || (echo "Auto-release after SIGKILL took ${elapsed}s — too slow, kernel cleanup may not be working" && exit 1)

          rm -f "/tmp/local-mutex-${H_KILL_TEST}.lock"
          echo "SIGKILL auto-release: OK"

      - name: Auto-release on SIGTERM
        run: |
          rm -f "/tmp/local-mutex-${H_TERM_TEST}.lock"

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh term-test 'sleep 60' &
          holder_pid=$!
          sleep 0.5

          # SIGTERM is the polite kill — the shell may run traps, then exit.
          # The kernel still releases the lock on process exit either way.
          kill -TERM "$holder_pid" 2>/dev/null
          wait 2>/dev/null

          start=$(date +%s)
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh term-test 'echo "acquired after term"'
          end=$(date +%s)
          elapsed=$((end - start))

          [ "$elapsed" -le 1 ] \
            || (echo "Auto-release after SIGTERM took ${elapsed}s — too slow" && exit 1)

          rm -f "/tmp/local-mutex-${H_TERM_TEST}.lock"
          echo "SIGTERM auto-release: OK"

      - name: Sequential normal-exit reacquire
        run: |
          rm -f "/tmp/local-mutex-${H_SEQ_TEST}.lock"

          # Acquire, release (normal exit), reacquire — should be instant.
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh seq-test 'true'
          start=$(date +%s)
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh seq-test 'true'
          end=$(date +%s)
          elapsed=$((end - start))

          [ "$elapsed" -le 1 ] \
            || (echo "Sequential reacquire took ${elapsed}s — lock may not be releasing" && exit 1)

          rm -f "/tmp/local-mutex-${H_SEQ_TEST}.lock"
          echo "Sequential normal-exit reacquire: OK"

      # ─── Robustness ──────────────────────────────────────────────────────

      - name: Empty name input fails clean
        id: empty-name
        continue-on-error: true
        uses: ./
        with:
          name: ''
          run: echo "should not run"

      - name: Verify empty name was rejected
        run: |
          [ "${{ steps.empty-name.outcome }}" = "failure" ] \
            || (echo "Expected failure on empty name, got: ${{ steps.empty-name.outcome }}" && exit 1)
          echo "Empty name rejection: OK"

      - name: Whitespace-only name fails clean
        id: ws-name
        continue-on-error: true
        uses: ./
        with:
          name: '   '
          run: echo "should not run"

      - name: Verify whitespace name was rejected
        run: |
          [ "${{ steps.ws-name.outcome }}" = "failure" ] \
            || (echo "Expected failure on whitespace name" && exit 1)
          echo "Whitespace name rejection: OK"

      - name: Empty run input fails clean
        id: empty-run
        continue-on-error: true
        uses: ./
        with:
          name: t-empty-run
          run: ''

      - name: Verify empty run was rejected
        run: |
          [ "${{ steps.empty-run.outcome }}" = "failure" ] \
            || (echo "Expected failure on empty run" && exit 1)
          echo "Empty run rejection: OK"

      - name: Whitespace-only run fails clean
        id: ws-run
        continue-on-error: true
        uses: ./
        with:
          name: t-ws-run
          run: '   '

      - name: Verify whitespace run was rejected
        run: |
          [ "${{ steps.ws-run.outcome }}" = "failure" ] \
            || (echo "Expected failure on whitespace run" && exit 1)
          echo "Whitespace run rejection: OK"

      - name: Wrong arg count fails clean
        id: bad-argc
        continue-on-error: true
        run: |
          # Invoke the script directly with one argument to exercise the
          # `$# -lt 2` branch. The composite action always passes two or
          # three inputs, so this path can only be reached by direct
          # invocation — we test it explicitly because the script has
          # dedicated rejection logic for it.
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh only-one-arg 2>/tmp/argc-err

      - name: Verify wrong arg count was rejected
        run: |
          [ "${{ steps.bad-argc.outcome }}" = "failure" ] \
            || (echo "Expected failure on one-arg invocation, got: ${{ steps.bad-argc.outcome }}" && cat /tmp/argc-err && exit 1)
          grep -q 'expected 2 or 3 arguments' /tmp/argc-err \
            || (echo "Expected arg-count error message, got:" && cat /tmp/argc-err && exit 1)
          rm -f /tmp/argc-err
          echo "Arg count rejection: OK"

      # Exercises the `$# -gt 3` branch, symmetric to the one-arg test
      # above. Guards against a future regression that accidentally
      # loosens the upper bound and starts silently ignoring trailing
      # arguments.
      - name: Too many arguments fails clean
        id: too-many-argc
        continue-on-error: true
        run: |
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh n c /tmp extra 2>/tmp/too-many-err

      - name: Verify too-many-args was rejected
        run: |
          [ "${{ steps.too-many-argc.outcome }}" = "failure" ] \
            || (echo "Expected failure on four-arg invocation" && cat /tmp/too-many-err && exit 1)
          grep -q 'expected 2 or 3 arguments' /tmp/too-many-err \
            || (echo "Expected arg-count error, got:" && cat /tmp/too-many-err && exit 1)
          rm -f /tmp/too-many-err
          echo "Too-many-args rejection: OK"

      # Names containing characters that would be awkward or unsafe in a
      # raw filename (slashes, colons, shell metacharacters, spaces) must
      # still produce a valid lock file. SHA-256 collapses every input
      # to exactly 64 hex characters, so the result is always a
      # single-component basename regardless of what the caller supplied.
      - name: Arbitrary characters in name hash safely
        run: |
          rm -f "/tmp/local-mutex-${H_SPECIAL}.lock"
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh 'foo/bar:baz@v1' 'true'

          # The lockfile lives at the hash path, NOT at any path that
          # interprets '/' as a directory separator.
          test -f "/tmp/local-mutex-${H_SPECIAL}.lock" \
            || (echo "Expected lockfile not found at /tmp/local-mutex-${H_SPECIAL}.lock" && exit 1)
          rm -f "/tmp/local-mutex-${H_SPECIAL}.lock"
          echo "Arbitrary-character name hashing: OK"

      # Path-traversal-looking names cannot escape lock-dir: the lockfile
      # basename is always exactly 64 hex characters, so even an input
      # that visually resembles a relative path (`../../etc/passwd`)
      # resolves to a flat filename inside lock-dir. This is a structural
      # guarantee from hashing, not a sanitization pass that could be
      # regressed.
      - name: Path-traversal name cannot escape lock-dir
        run: |
          rm -f "/tmp/local-mutex-${H_TRAVERSAL}.lock"

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh '../../etc/passwd' 'true'

          test -f "/tmp/local-mutex-${H_TRAVERSAL}.lock" \
            || (echo "Expected lockfile not found at /tmp/local-mutex-${H_TRAVERSAL}.lock" && exit 1)

          # Negative assertion: a regression that stopped hashing and
          # instead tried to interpret the name as a path would fail open
          # with ENOENT because the intermediate `/tmp/local-mutex-..`
          # directory doesn't exist. Asserting the hashed-path file
          # exists (above) is the affirmative check; this test's mere
          # success (exit 0) means we never wrote outside lock-dir.

          rm -f "/tmp/local-mutex-${H_TRAVERSAL}.lock"
          echo "Path-traversal hashing: OK"

      # Both sha256sum (Linux) and shasum -a 256 (macOS) are
      # byte-oriented, so invalid UTF-8 bytes in the name hash cleanly
      # on every supported runner without locale configuration. Previous
      # versions used tr under LC_ALL=C to avoid BSD tr's "Illegal byte
      # sequence" abort under a UTF-8 locale; hashing removes that
      # failure mode entirely.
      - name: Invalid UTF-8 byte in name hashes cleanly
        run: |
          invalid_name=$(printf '\xFFbadname')
          if command -v sha256sum >/dev/null 2>&1; then
            expected_hash=$(printf '%s' "$invalid_name" | sha256sum | cut -d' ' -f1)
          else
            expected_hash=$(printf '%s' "$invalid_name" | shasum -a 256 | cut -d' ' -f1)
          fi
          rm -f "/tmp/local-mutex-${expected_hash}.lock"

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh "$invalid_name" 'true'

          test -f "/tmp/local-mutex-${expected_hash}.lock" \
            || (echo "lockfile missing for invalid-UTF-8 input" && exit 1)
          rm -f "/tmp/local-mutex-${expected_hash}.lock"
          echo "Invalid UTF-8 byte hashing: OK"

      # Any length of input produces a 64-hex basename, because SHA-256
      # hashes to a fixed size. This replaces the pre-v2.0.1 truncation
      # behavior that would silently collapse two names sharing a
      # 200-char prefix onto the same lock. The collision-avoidance test
      # below proves the upgrade: distinct long names now serialize on
      # distinct locks.
      - name: Very long name produces a fixed-length basename
        run: |
          # 1000 'a's — well past the old 200-char truncation point.
          long_name=$(printf 'a%.0s' $(seq 1 1000))
          if command -v sha256sum >/dev/null 2>&1; then
            expected_hash=$(printf '%s' "$long_name" | sha256sum | cut -d' ' -f1)
          else
            expected_hash=$(printf '%s' "$long_name" | shasum -a 256 | cut -d' ' -f1)
          fi
          expected_basename="local-mutex-${expected_hash}.lock"
          rm -f "/tmp/$expected_basename"

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh "$long_name" 'true'

          test -f "/tmp/$expected_basename" \
            || (echo "Expected lockfile not found at /tmp/$expected_basename" && exit 1)

          rm -f "/tmp/$expected_basename"
          echo "Very long name: OK (${#long_name}-char input → 64-hex basename)"

      # Two long names that differ only in their last character previously
      # collapsed to the same lock because tr-sanitized basenames were
      # truncated to 200 chars. Under SHA-256 they hash to completely
      # different digests and therefore serialize on distinct locks, which
      # is the correctness property. This test measures wall clock: if the
      # names still collided, the two callers would run serially (~6s);
      # under distinct locks they run in parallel (~3s).
      - name: Long names with shared 200-char prefix don't collide
        run: |
          long_prefix=$(printf 'a%.0s' $(seq 1 200))
          name_a="${long_prefix}-suffix-a"
          name_b="${long_prefix}-suffix-b"

          if command -v sha256sum >/dev/null 2>&1; then
            hash_a=$(printf '%s' "$name_a" | sha256sum | cut -d' ' -f1)
            hash_b=$(printf '%s' "$name_b" | sha256sum | cut -d' ' -f1)
          else
            hash_a=$(printf '%s' "$name_a" | shasum -a 256 | cut -d' ' -f1)
            hash_b=$(printf '%s' "$name_b" | shasum -a 256 | cut -d' ' -f1)
          fi
          rm -f "/tmp/local-mutex-${hash_a}.lock" "/tmp/local-mutex-${hash_b}.lock"

          start=$(date +%s)
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh "$name_a" 'sleep 3' &
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh "$name_b" 'sleep 3' &
          wait
          end=$(date +%s)
          elapsed=$((end - start))

          # parallel ≈ 3s, serialized-because-collided ≈ 6s. Upper bound
          # 4s catches the regression while tolerating CI jitter.
          [ "$elapsed" -le 4 ] \
            || (echo "Expected ~3s parallel (distinct hashes), got ${elapsed}s — hashing may be collapsing long names" && exit 1)

          # Both lockfiles should exist and be distinct.
          test -f "/tmp/local-mutex-${hash_a}.lock" \
            || (echo "lockfile for name_a missing" && exit 1)
          test -f "/tmp/local-mutex-${hash_b}.lock" \
            || (echo "lockfile for name_b missing" && exit 1)
          [ "$hash_a" != "$hash_b" ] \
            || (echo "hashes collided unexpectedly (SHA-256 should never collide on 1-char diff)" && exit 1)

          rm -f "/tmp/local-mutex-${hash_a}.lock" "/tmp/local-mutex-${hash_b}.lock"
          echo "Long-prefix non-collision: OK (${elapsed}s)"

      - name: Single-character name produces a valid lock file
        run: |
          # A single character must produce a valid hashed basename. This
          # guards against a future regression that adds an over-eager
          # "minimum length" check on the input and silently breaks
          # single-character inputs. '.' is the specific case that used
          # to produce the oddly-named `/tmp/local-mutex-..lock` under
          # the old sanitizer; it now produces a normal hashed path.
          rm -f "/tmp/local-mutex-${H_DOT}.lock"
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh '.' 'true'
          test -f "/tmp/local-mutex-${H_DOT}.lock" \
            || (echo "Expected single-dot lockfile not found at /tmp/local-mutex-${H_DOT}.lock" && exit 1)
          rm -f "/tmp/local-mutex-${H_DOT}.lock"
          echo "Single-character name: OK"

      # Names containing newlines would split the ::notice:: annotation
      # into two lines, and the runner's log parser could then re-interpret
      # the second line as a workflow command. The script rejects any name
      # containing ASCII control characters (byte 0x00–0x1F or 0x7F) up
      # front with exit 2 and a clear ::error:: annotation.
      - name: Newline in name is rejected
        id: newline-name
        continue-on-error: true
        run: |
          name=$(printf 'has\nnewline')
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh "$name" 'echo "should not run"' 2>/tmp/newline-err

      - name: Verify newline name was rejected
        run: |
          [ "${{ steps.newline-name.outcome }}" = "failure" ] \
            || (echo "Expected failure on newline name, got: ${{ steps.newline-name.outcome }}" && cat /tmp/newline-err && exit 1)
          grep -q 'control characters' /tmp/newline-err \
            || (echo "Expected control-char error message, got:" && cat /tmp/newline-err && exit 1)
          rm -f /tmp/newline-err
          echo "Newline name rejection: OK"

      # Symmetric test for non-newline control chars — tab is the most
      # common one likely to sneak in via indentation or copy-paste. The
      # rejection logic is a single case pattern, so catching any control
      # char proves the whole class is rejected; a tab-specific test
      # provides a second concrete example to prevent a future "only
      # check \n" narrowing regression.
      - name: Tab in name is rejected
        id: tab-name
        continue-on-error: true
        run: |
          name=$(printf 'has\ttab')
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh "$name" 'echo "should not run"' 2>/tmp/tab-err

      - name: Verify tab name was rejected
        run: |
          [ "${{ steps.tab-name.outcome }}" = "failure" ] \
            || (echo "Expected failure on tab name" && cat /tmp/tab-err && exit 1)
          grep -q 'control characters' /tmp/tab-err \
            || (echo "Expected control-char error message, got:" && cat /tmp/tab-err && exit 1)
          rm -f /tmp/tab-err
          echo "Tab name rejection: OK"

      # Build a fake PATH directory containing only the SHA-256 command
      # (sha256sum on Linux, shasum on macOS) but explicitly no lockf or
      # flock. The script should reach the lock-primitive probe, fail
      # cleanly with exit 127, and emit a ::error:: annotation.
      #
      # Use /bin/sh explicitly to match action.yml's `shell: sh`, so the
      # test exercises the same interpreter the action will use in
      # production. Don't symlink sh into the fake PATH — /bin/sh is the
      # canonical interpreter location and using it directly makes the
      # test intent unambiguous.
      #
      # We can't just `PATH= /bin/sh ...` because that also strips the
      # SHA-256 command, which the script needs to compute the lockfile
      # basename. The fake-PATH approach exercises specifically the
      # "lock binary missing" case while leaving the script's other
      # dependencies functional.
      - name: Missing lock binary fails with clear error
        run: |
          test_dir=$(mktemp -d)
          sha256sum_path=$(command -v sha256sum 2>/dev/null || true)
          shasum_path=$(command -v shasum 2>/dev/null || true)
          [ -n "$sha256sum_path" ] && ln -s "$sha256sum_path" "$test_dir/sha256sum"
          [ -n "$shasum_path" ] && ln -s "$shasum_path" "$test_dir/shasum"

          set +e
          PATH="$test_dir" /bin/sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh missing-binary 'true' 2>/tmp/err
          exit_code=$?
          set -e
          rm -rf "$test_dir"

          [ "$exit_code" = "127" ] \
            || (echo "Expected exit 127 for missing binary, got $exit_code" && cat /tmp/err && exit 1)

          grep -q 'neither lockf' /tmp/err \
            || (echo "Expected clear error message about missing lockf/flock, got:" && cat /tmp/err && exit 1)

          rm -f /tmp/err
          echo "Missing lock binary error: OK"

      # Symmetric test for the SHA-256 probe: fake PATH containing only
      # lockf/flock symlinks (no sha256sum, no shasum) makes the script
      # fail its hashing step with exit 127 and a clear ::error::
      # annotation instead of the shell's default "command not found"
      # with no annotation. `|| true` on the `command -v` probes is
      # required because step shells run under `bash -e` by default: a
      # bare `x=$(command -v nosuchcmd)` aborts the step when the probe
      # fails, before we ever reach the test assertions. Ubuntu runners
      # don't ship `lockf` and macOS runners don't ship `flock`, so at
      # least one probe always fails on each platform.
      - name: Missing SHA-256 tool fails with clear error
        run: |
          test_dir=$(mktemp -d)
          lockf_path=$(command -v lockf 2>/dev/null || true)
          flock_path=$(command -v flock 2>/dev/null || true)
          [ -n "$lockf_path" ] && ln -s "$lockf_path" "$test_dir/lockf"
          [ -n "$flock_path" ] && ln -s "$flock_path" "$test_dir/flock"

          set +e
          PATH="$test_dir" /bin/sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh missing-sha 'true' 2>/tmp/err
          exit_code=$?
          set -e
          rm -rf "$test_dir"

          [ "$exit_code" = "127" ] \
            || (echo "Expected exit 127 for missing SHA-256 tool, got $exit_code" && cat /tmp/err && exit 1)

          grep -q 'neither sha256sum' /tmp/err \
            || (echo "Expected clear error message about missing SHA-256 tool, got:" && cat /tmp/err && exit 1)

          rm -f /tmp/err
          echo "Missing SHA-256 tool error: OK"

      # ─── Caller environment propagation ──────────────────────────────────

      - name: Step-level env is visible inside run
        uses: ./
        env:
          MY_STEP_VAR: step-level-value
        with:
          name: t-step-env
          run: |
            [ "$MY_STEP_VAR" = "step-level-value" ] \
              || (echo "Expected MY_STEP_VAR=step-level-value, got: $MY_STEP_VAR" && exit 1)

      - name: Job-level env propagates
        uses: ./
        with:
          name: t-job-env
          # CUSTOM_TEST_VAR is set in the job-level `env:` block. Asserting
          # it reaches the wrapped command proves the action doesn't drop
          # job-scope env while chaining through the composite's shell
          # step. Previously this test used GITHUB_WORKFLOW, which is set
          # by the runner rather than by `env:`, so it never exercised
          # propagation at all.
          run: |
            [ "$CUSTOM_TEST_VAR" = "expected-value" ] \
              || (echo "Expected CUSTOM_TEST_VAR=expected-value, got: $CUSTOM_TEST_VAR" && exit 1)

      # Test the output-file passthrough: inner command writes to
      # GITHUB_OUTPUT, caller reads the file to propagate them.
      - name: Inner command writes outputs under mutex
        id: output-test
        uses: ./
        with:
          name: t-output-passthrough
          run: |
            printf 'test-key=hello-world\n' >> "$GITHUB_OUTPUT"
            printf 'another-key=42\n' >> "$GITHUB_OUTPUT"

      - name: Verify output-file is set and contains inner writes
        run: |
          output_file="${{ steps.output-test.outputs.output-file }}"
          [ -n "$output_file" ] \
            || (echo "Expected output-file to be set" && exit 1)
          [ -f "$output_file" ] \
            || (echo "Expected output-file to exist at: $output_file" && exit 1)
          grep "test-key=hello-world" "$output_file" \
            || (echo "Expected test-key=hello-world in output-file" && exit 1)
          grep "another-key=42" "$output_file" \
            || (echo "Expected another-key=42 in output-file" && exit 1)
          echo "Output-file contents: OK"

      - name: Propagate inner outputs via output-file
        id: propagated
        shell: sh
        run: |
          cat "${{ steps.output-test.outputs.output-file }}" >> "$GITHUB_OUTPUT"

      - name: Verify propagated outputs are accessible as step outputs
        run: |
          [ "${{ steps.propagated.outputs.test-key }}" = "hello-world" ] \
            || (echo "Expected propagated test-key=hello-world, got: ${{ steps.propagated.outputs.test-key }}" && exit 1)
          [ "${{ steps.propagated.outputs.another-key }}" = "42" ] \
            || (echo "Expected propagated another-key=42, got: ${{ steps.propagated.outputs.another-key }}" && exit 1)
          echo "Output propagation round-trip: OK"

      - name: Working directory propagates
        uses: ./
        with:
          name: t-wd
          # `pwd` inside the run should be the GITHUB_WORKSPACE (the repo
          # checkout root), not /tmp or the action's location.
          run: |
            actual=$(pwd)
            expected="$GITHUB_WORKSPACE"
            [ "$actual" = "$expected" ] \
              || (echo "Expected pwd=$expected, got $actual" && exit 1)

      # ─── Diagnostic notices ──────────────────────────────────────────────

      # Both bookend notices must reach stderr so callers debugging a hung
      # step can see what the step is blocked on and when it cleared.
      # Invoked via direct script call so stderr can be captured to a file
      # and grep'd — the `uses: ./` path sends notices to the job log
      # where they aren't easily read back within the same job.
      #
      # The timestamp pattern is `YYYY-MM-DDTHH:MM:SSZ` (UTC). The regex
      # only checks structure, not values, because we have no stable time
      # reference to assert exact values.
      - name: Waiting and release notices are emitted
        run: |
          rm -f "/tmp/local-mutex-${H_T_DIAG}.lock" /tmp/diag-stderr

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-diag 'sleep 0.2' 2>/tmp/diag-stderr

          grep -qE '::notice::local-mutex: waiting for lock t-diag at [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' /tmp/diag-stderr \
            || (echo "wait notice missing or malformed" && cat /tmp/diag-stderr && exit 1)
          grep -qE '::notice::local-mutex: released t-diag at [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' /tmp/diag-stderr \
            || (echo "release notice missing or malformed" && cat /tmp/diag-stderr && exit 1)

          rm -f "/tmp/local-mutex-${H_T_DIAG}.lock" /tmp/diag-stderr
          echo "Diagnostic notices on success: OK"

      # The release notice must fire even when the wrapped command exits
      # non-zero — a diagnostic bookend that only appears on success is
      # useless precisely when debugging failures, which is when it
      # matters most.
      - name: Release notice fires when wrapped command fails
        run: |
          rm -f "/tmp/local-mutex-${H_T_DIAG_FAIL}.lock" /tmp/diag-fail-stderr

          set +e
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-diag-fail 'exit 3' 2>/tmp/diag-fail-stderr
          rc=$?
          set -e

          [ "$rc" = "3" ] \
            || (echo "Expected exit 3, got $rc" && cat /tmp/diag-fail-stderr && exit 1)
          grep -qE '::notice::local-mutex: released t-diag-fail at [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' /tmp/diag-fail-stderr \
            || (echo "release notice missing on failure" && cat /tmp/diag-fail-stderr && exit 1)

          rm -f "/tmp/local-mutex-${H_T_DIAG_FAIL}.lock" /tmp/diag-fail-stderr
          echo "Release notice on failure: OK"

      # If the caller installs their own EXIT trap, POSIX sh replaces our
      # trap with theirs. The contract: caller's trap still runs
      # correctly; our release notice is suppressed. This test proves
      # both halves — the caller's marker is written, and our release
      # notice does NOT appear in stderr.
      - name: Caller EXIT trap overrides release notice
        run: |
          rm -f "/tmp/local-mutex-${H_T_DIAG_TRAP}.lock" /tmp/diag-trap-stderr /tmp/diag-trap-marker

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-diag-trap \
            "trap 'echo caller-trap-fired > /tmp/diag-trap-marker' EXIT; true" \
            2>/tmp/diag-trap-stderr

          test -f /tmp/diag-trap-marker \
            || (echo "caller's trap did not fire" && cat /tmp/diag-trap-stderr && exit 1)
          [ "$(cat /tmp/diag-trap-marker)" = "caller-trap-fired" ] \
            || (echo "caller's trap marker has wrong content" && cat /tmp/diag-trap-marker && exit 1)

          grep -q '::notice::local-mutex: waiting for lock t-diag-trap' /tmp/diag-trap-stderr \
            || (echo "wait notice should still appear" && cat /tmp/diag-trap-stderr && exit 1)

          if grep -q '::notice::local-mutex: released t-diag-trap' /tmp/diag-trap-stderr; then
            echo "release notice should have been suppressed by caller's trap"
            cat /tmp/diag-trap-stderr
            exit 1
          fi

          rm -f "/tmp/local-mutex-${H_T_DIAG_TRAP}.lock" /tmp/diag-trap-stderr /tmp/diag-trap-marker
          echo "Caller trap overrides release notice: OK"

      # ─── lock-dir input ──────────────────────────────────────────────────

      # Custom lock-dir puts the lock file in the specified directory and
      # NOT in /tmp. The negative-leak assertion catches regressions where
      # the path construction silently falls back to /tmp.
      - name: Custom lock-dir uses the specified directory
        run: |
          test_dir="$RUNNER_TEMP/custom-lockdir"
          rm -rf "$test_dir" "/tmp/local-mutex-${H_T_CUSTOM_DIR}.lock"
          mkdir -p "$test_dir"

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-custom-dir 'true' "$test_dir"

          test -f "$test_dir/local-mutex-${H_T_CUSTOM_DIR}.lock" \
            || (echo "Lock file missing at $test_dir" && ls -la "$test_dir" && exit 1)
          test ! -f "/tmp/local-mutex-${H_T_CUSTOM_DIR}.lock" \
            || (echo "Lock file leaked to /tmp" && exit 1)

          rm -rf "$test_dir"
          echo "Custom lock-dir: OK"

      # The central mutual-exclusion invariant must still hold when both
      # callers share a custom lock-dir. Mirrors the existing "Two
      # concurrent same-name acquires serialize" test but uses a non-/tmp
      # directory, which is the whole point of the input: prove the
      # kernel-level lock still works from a different shared filesystem.
      - name: Concurrent same-name serializes in custom lock-dir
        run: |
          test_dir="$RUNNER_TEMP/concurrent-lockdir"
          rm -rf "$test_dir"
          mkdir -p "$test_dir"
          rm -f /tmp/cl-1-start /tmp/cl-1-end /tmp/cl-2-start /tmp/cl-2-end

          ts='python3 -c "import time; print(time.time_ns())"'
          hold_sleep=0.5
          tolerance=100000000

          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh cl-2 \
            "$ts > /tmp/cl-1-start; sleep $hold_sleep; $ts > /tmp/cl-1-end" \
            "$test_dir" &
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh cl-2 \
            "$ts > /tmp/cl-2-start; sleep $hold_sleep; $ts > /tmp/cl-2-end" \
            "$test_dir" &
          wait

          s1=$(cat /tmp/cl-1-start); e1=$(cat /tmp/cl-1-end)
          s2=$(cat /tmp/cl-2-start); e2=$(cat /tmp/cl-2-end)

          if [ "$s1" -le "$s2" ]; then
            earlier_end=$e1; later_start=$s2; order="1-then-2"
          else
            earlier_end=$e2; later_start=$s1; order="2-then-1"
          fi

          if [ "$earlier_end" -gt "$((later_start + tolerance))" ]; then
            echo "Overlap in custom lock-dir ($order): earlier_end=$earlier_end later_start=$later_start"
            exit 1
          fi

          rm -f /tmp/cl-1-start /tmp/cl-1-end /tmp/cl-2-start /tmp/cl-2-end
          rm -rf "$test_dir"
          echo "Concurrent serialization in custom lock-dir: OK ($order)"

      # Empty-string third arg falls back to /tmp. This matches the
      # action.yml surface: an unset `lock-dir:` input sends an empty
      # string down to the script, which must treat it the same as
      # "not provided."
      - name: Empty lock-dir falls back to /tmp
        run: |
          rm -f "/tmp/local-mutex-${H_T_EMPTY_LD}.lock"
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-empty-ld 'true' ''
          test -f "/tmp/local-mutex-${H_T_EMPTY_LD}.lock" \
            || (echo "Lock file missing at /tmp — empty lock-dir did not default" && exit 1)
          rm -f "/tmp/local-mutex-${H_T_EMPTY_LD}.lock"
          echo "Empty lock-dir defaults to /tmp: OK"

      # Validation: relative paths are rejected. A relative path would
      # resolve against CWD which is not stable across runners/jobs, so
      # two callers with the "same" relative lock-dir could end up with
      # locks on different inodes — mutex silently breaks.
      - name: Relative lock-dir is rejected
        id: rel-lockdir
        continue-on-error: true
        run: |
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-rel 'true' 'relative/path' 2>/tmp/rel-err

      - name: Verify relative lock-dir was rejected
        run: |
          [ "${{ steps.rel-lockdir.outcome }}" = "failure" ] \
            || (echo "Expected failure on relative lock-dir" && exit 1)
          grep -q 'must be an absolute path' /tmp/rel-err \
            || (echo "Expected absolute-path error, got:" && cat /tmp/rel-err && exit 1)
          rm -f /tmp/rel-err
          echo "Relative lock-dir rejection: OK"

      # Validation: non-existent directory is rejected before any
      # lockfile work. Without this check the failure happens inside
      # lockf/flock with a less useful error.
      - name: Non-existent lock-dir is rejected
        id: missing-lockdir
        continue-on-error: true
        run: |
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-noex 'true' '/this-path-should-not-exist-xyz123' 2>/tmp/noex-err

      - name: Verify non-existent lock-dir was rejected
        run: |
          [ "${{ steps.missing-lockdir.outcome }}" = "failure" ] \
            || (echo "Expected failure on non-existent lock-dir" && exit 1)
          grep -q 'does not exist or is not a directory' /tmp/noex-err \
            || (echo "Expected non-existent error, got:" && cat /tmp/noex-err && exit 1)
          rm -f /tmp/noex-err
          echo "Non-existent lock-dir rejection: OK"

      # Validation: non-writable directory is rejected. Protects against
      # a read-only mount silently preventing the lock file from being
      # created. Cleanup uses a trap so the 555 chmod is always reversed
      # even when the script call exits the step early.
      - name: Non-writable lock-dir is rejected
        id: ro-lockdir
        continue-on-error: true
        run: |
          test_dir="$RUNNER_TEMP/ro-lockdir"
          rm -rf "$test_dir"
          mkdir -p "$test_dir"
          trap 'chmod 755 "$test_dir" 2>/dev/null; rm -rf "$test_dir"' EXIT
          chmod 555 "$test_dir"
          sh "$GITHUB_WORKSPACE"/lib/local-mutex.sh t-ro 'true' "$test_dir" 2>/tmp/ro-err

      - name: Verify non-writable lock-dir was rejected
        run: |
          [ "${{ steps.ro-lockdir.outcome }}" = "failure" ] \
            || (echo "Expected failure on non-writable lock-dir" && exit 1)
          grep -q 'is not writable' /tmp/ro-err \
            || (echo "Expected non-writable error, got:" && cat /tmp/ro-err && exit 1)
          rm -f /tmp/ro-err
          echo "Non-writable lock-dir rejection: OK"

      # Through the action interface: setting `lock-dir:` on a `uses: ./`
      # step must route through action.yml → the script's 3rd positional
      # arg → the lock-file path. Proves the full plumbing, not just the
      # script's direct-invocation path.
      - name: Prepare custom lock-dir for action-interface test
        run: mkdir -p "$RUNNER_TEMP/action-lockdir"

      - name: lock-dir input routes through action.yml
        uses: ./
        with:
          name: t-action-lockdir
          lock-dir: ${{ runner.temp }}/action-lockdir
          run: echo "locked under custom dir"

      - name: Verify action-interface lock-dir was honored
        run: |
          test -f "$RUNNER_TEMP/action-lockdir/local-mutex-${H_T_ACTION_LOCKDIR}.lock" \
            || (echo "lock file not in custom dir" && ls -la "$RUNNER_TEMP/action-lockdir" && exit 1)
          test ! -f "/tmp/local-mutex-${H_T_ACTION_LOCKDIR}.lock" \
            || (echo "lock file leaked to /tmp" && exit 1)
          rm -rf "$RUNNER_TEMP/action-lockdir"
          echo "Action-interface lock-dir: OK"
